name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (saves runner minutes on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install deps (data + trading + test; not the heavy qlib backtest extra)
        run: |
          uv venv
          uv pip install -e '.[data,trading,test]'
      - name: Lint (ruff, pinned to match local)
        run: uvx ruff@0.15.15 check mosaic tests
      - name: Prompt leak guard
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run python scripts/check_prompt_leaks.py --base-ref "origin/${{ github.base_ref }}"
          else
            uv run python scripts/check_prompt_leaks.py
          fi
      - name: Test (pytest; qlib-only tests skip without the backtest extra)
        env:
          PYTEST_BASETEMP_ROOT: ${{ runner.temp }}/pytest
        run: |
          set -euo pipefail

          run_pytest() {
            label="$1"
            shift
            basetemp="$PYTEST_BASETEMP_ROOT/$label"
            rm -rf "$basetemp"
            mkdir -p "$basetemp"
            echo "::group::pytest $label"
            df -h .
            (
              while true; do
                echo "pytest heartbeat $label $(date -u +%H:%M:%S)"
                sleep 60
              done
            ) &
            heartbeat_pid=$!
            set +e
            uv run python -m pytest "$@" --basetemp "$basetemp" -vv --durations=20
            status=$?
            kill "$heartbeat_pid" 2>/dev/null || true
            wait "$heartbeat_pid" 2>/dev/null || true
            set -e
            rm -rf "$basetemp"
            echo "::endgroup::"
            df -h .
            return "$status"
          }

          du -sh registry tests
          find registry -type f -size +20M -printf '%s %p\n'
          run_pytest non-rke tests --ignore-glob 'tests/test_rke_*.py'
          run_pytest rke-report-intelligence tests/test_rke_report_intelligence.py
          while IFS= read -r file; do
            run_pytest "$(basename "$file" .py)" "$file"
          done < <(find tests -maxdepth 1 -name 'test_rke_*.py' ! -name 'test_rke_report_intelligence.py' | sort)

  typescript:
    name: TypeScript (typecheck / lint / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # The TS test suite spawns the real Python bridge (`python -m mosaic.bridge`)
      # via <repoRoot>/.venv; create it with the deps those live tests exercise
      # (macro tools → data; paper.* → trading).
      - name: Set up Python bridge venv
        run: |
          uv venv
          uv pip install -e '.[data,trading]'
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install (pnpm)
        working-directory: mosaic-ts
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: mosaic-ts
        run: pnpm typecheck
      - name: Lint (biome)
        working-directory: mosaic-ts
        run: pnpm lint
      - name: Test (vitest)
        working-directory: mosaic-ts
        run: pnpm test
